# Default: IntelliDigest only (FastAPI + Chroma + SQLite). No n8n — lighter for production (e.g. Oracle Cloud Free Tier).
# For bundled n8n + Telegram workflows, use: docker compose -f docker-compose.with-n8n.yml up -d --build

services:
  intellidigest:
    build:
      context: .
      pull: false
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - TRANSFORMERS_NO_TF=1
      - USE_TF=0
    volumes:
      - chroma_data:/app/chroma_db
      - ticket_data:/app/data
    restart: unless-stopped

volumes:
  chroma_data:
  ticket_data:
