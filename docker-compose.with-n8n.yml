# Legacy / lab stack: IntelliDigest + bundled n8n (Telegram workflows).
# Run: docker compose -f docker-compose.with-n8n.yml up -d --build
#
# Default docker-compose.yml is app-only (lighter, suitable for production / Oracle Cloud).

services:
  # ── IntelliDigest (FastAPI + LangChain) ─────────────────────────
  intellidigest:
    build:
      context: .
      pull: false
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - TRANSFORMERS_NO_TF=1
      - USE_TF=0
    volumes:
      - chroma_data:/app/chroma_db
      - ticket_data:/app/data
    depends_on:
      - n8n
    restart: unless-stopped

  # ── n8n (Self-Hosted Workflow Automation) ────────────────────────
  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

volumes:
  chroma_data:
  ticket_data:
  n8n_data:
