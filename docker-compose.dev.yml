# Development: live code from the host + auto-reload (no image rebuild for Python/frontend edits).
# First time (or after requirements.txt change): docker compose -f docker-compose.yml -f docker-compose.dev.yml build
# Daily:          docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# Bind order: project over /app, then named volumes mask chroma_db and data only.
services:
  intellidigest:
    volumes:
      - .:/app
      - chroma_data:/app/chroma_db
      - ticket_data:/app/data
    command:
      [
        "uvicorn",
        "server:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    # Base compose still sets TRANSFORMERS_NO_TF / USE_TF via environment merge.
    # If --reload misses file saves (Docker Desktop + Windows), add under environment:
    #   - WATCHFILES_FORCE_POLLING=true
